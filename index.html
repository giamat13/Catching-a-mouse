<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>תופסת עכבר</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="game-container">
    <header>
      <h1>🐭 תופסת עכבר 🐱</h1>
      <div id="hud">
        <span id="score-display">ניקוד: <strong id="score">0</strong></span>
        <span id="timer-display">זמן: <strong id="timer">30</strong></span>
        <span id="level-display">שלב: <strong id="level">1</strong></span>
      </div>
    </header>

    <div id="board-wrapper">
      <div id="board"></div>
    </div>

    <div id="overlay" class="visible">
      <div id="menu-box">
        <div id="menu-icon">🐭</div>
        <h2 id="menu-title">תופסת עכבר</h2>
        <p id="menu-subtitle">לחץ על העכברים מהר לפני שהם בורחים!</p>
        <div id="final-score-wrap" class="hidden">
          <p>הניקוד שלך: <strong id="final-score">0</strong></p>
        </div>
        <div id="cheat-input-wrap">
          <input type="password" id="cheat-input" placeholder="🔐 קוד סודי..." />
        </div>
        <button id="start-btn">התחל משחק</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
